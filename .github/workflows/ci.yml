name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Backend ───────────────────────────────────────────────
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tarng
          POSTGRES_PASSWORD: tarng_secret
          POSTGRES_DB: tarng_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Format check with Black
        run: black --check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql://tarng:tarng_secret@localhost:5432/tarng_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-secret-key-for-testing
        run: pytest tests/ -v --tb=short

  # ─── Frontend ──────────────────────────────────────────────
  frontend-lint-typecheck:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  # ─── Docker Build ──────────────────────────────────────────
  backend-docker-build:
    name: Backend — Docker Build
    runs-on: ubuntu-latest
    needs: backend-lint-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tarng-backend:${{ github.sha }} ./backend
